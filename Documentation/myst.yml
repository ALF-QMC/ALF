version: 1
project:
  numbering: true
  bibliography:
    - doc.bib
    - fassaad.bib
  id: 4c9c89da-7016-4b76-976b-62be99ef6d04
  title: ALF Documentation
  description: 'Documentation for the Algorithms for Lattice Fermions (ALF) project.'
  keywords: ['ALF', 'documentation', 'quantum Monte Carlo', 'lattice fermions']
  # authors: []
  github: https://github.com/ALF-QMC/ALF
  math:
    '\ALFver': 'dev.'        # {2.2}{dev.} version of ALF this document refers to
    '\ALFbranch': 'master'   # {ALF-2.2}{master} corresponding ALF branch
    '\pyALFver': 'dev.'      # {2.2}{dev.} version of pyALF that works with \ALFver
    '\pyALFbranch': 'master' # {ALF-2.2}{master} corresponding pyALF branch
    '\tutALFver': 'dev'
    '\Tr': '\mathop{\mathrm{Tr}}'
    '\Trf': '\mathop{\mathrm{Tr}_{\mathrm{F}}}'
    '\d': '\mathrm{d}'
    '\hc': '\mathrm{H.c.}'
    '\Re': '\operatorname{Re}'
    '\Im': '\operatorname{Im}'
    '\vec': '\boldsymbol'
    '\ve': '\boldsymbol'
    '\tl': 't_{l}'
    '\ts': '\underline{t}'
    '\Ztwo': '\mathbf{Z}_{2}'
  exports:
    - format: docx
    - format: pdf
      template: arxiv_nips
  toc:
    # Use the following line for a single file document:
    #- file: doc.tex

    - title: Abstract
      file: titlepage.tex
    - title: Introduction
      file: intro.tex
    - title: Method
      children:
        - file: model.tex
        - file: updating.tex
        - file: langevin.tex
        - file: hmc.tex
        - file: stabilization.tex
    - file: model.tex
    - file: updating.tex
    - file: langevin.tex
    - file: hmc.tex
    - file: stabilization.tex
    - file: pqmc.tex
    - file: sampling.tex
    - file: implementation.tex
    - file: files.tex
    - file: running.tex
    - file: Hubbard_Plain.tex
    - file: predefined.tex
    - file: Model_classes.tex
    - file: maxent.tex
    - file: conclusion.tex
    - file: acknowledgment.tex

